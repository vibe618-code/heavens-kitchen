                );
            }
            
            return ( <div className="relative"> <FloatingItems /> <header className="fixed top-0 left-0 right-0 z-30 glass shadow-lg py-3"><div className="max-w-7xl mx-auto px-6 flex items-center justify-between"><div className="flex items-center gap-4"><button onClick={()=>setSidebarOpen(true)} className="p-2 rounded-full glass-card focus:outline-none"><div className="hamburger-icon"><span className="hamburger-line"></span><span className="hamburger-line"></span><span className="hamburger-line"></span></div></button><a href="#hero" className="font-display text-2xl font-bold">CLOUD KITCHEN<span className="text-red-velvet">.</span></a></div><div className="flex items-center gap-4"><span className="text-sm italic hidden sm:inline cart-hd-text">{weatherGreeting}</span><button onClick={()=>setCartOpen(true)} className="relative p-2 rounded-full glass-card"><i className="fas fa-shopping-cart text-xl"></i>{cartCount>0 && <span className="absolute -top-1 -right-1 bg-red-velvet text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">{cartCount}</span>}</button></div></div></header> <HamburgerMenu isOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)} darkMode={darkMode} onToggleDarkMode={toggleDarkMode} onNavigate={handleNavigate} userName={userName} loyaltyPoints={coins} /> <div className={`fixed inset-0 z-50 flex justify-end ${cartOpen ? 'visible' : 'invisible'}`}> {cartOpen && <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={()=>setCartOpen(false)}></div>} <div className={`relative w-full max-w-md bg-cream dark:bg-dark-chocolate shadow-2xl h-full flex flex-col ${cartOpen ? 'cart-drawer-enter' : ''}`}> <div className="flex justify-between items-center p-5 border-b border-border"> <h2 className="font-display text-2xl font-bold flex items-center gap-2"><i className="fas fa-shopping-bag"></i> {t.cart} <span className="text-sm font-normal">({cartCount})</span></h2> <button onClick={()=>setCartOpen(false)} className="text-2xl"><i className="fas fa-times"></i></button> </div> <div className="flex-1 overflow-y-auto p-4 space-y-3"> {cartItems.length===0 ? <p className="text-center text-text-secondary py-8 cart-hd-text">{t.emptyCart}</p> : cartItems.map(item=> ( <div key={item.sku+item.customizations} className="bg-elevated rounded-card p-3 flex gap-3 items-center border border-border"> <img src={item.image} className="w-16 h-16 rounded-lg object-cover" /> <div className="flex-1"><p className="font-semibold cart-hd-text">{item.name}</p><p className="text-sm text-velvet-red">₹{item.unitPrice}</p><p className="text-xs text-text-secondary">{item.customizations || ''}</p></div> <div className="flex items-center gap-2"><button onClick={()=>updateQuantity(item.sku, -1, item.customizations)} className="w-7 h-7 rounded-full bg-soft-beige dark:bg-dark-chocolate/60 font-bold">−</button><span>{item.qty}</span><button onClick={()=>updateQuantity(item.sku, 1, item.customizations)} className="w-7 h-7 rounded-full bg-soft-beige dark:bg-dark-chocolate/60 font-bold">+</button></div> <button onClick={()=>removeItem(item.sku, item.customizations)} className="text-error text-lg"><i className="fas fa-trash-alt"></i></button> </div> )) } </div>
                <div className="p-5 border-t border-border space-y-3">
                    <div className="flex justify-between font-bold text-lg cart-hd-text"><span>{t.itemTotal}</span><span className="cart-total-hd">₹{cartDisplayTotal.toFixed(2)}</span></div>
                    <button onClick={proceedToCheckout} disabled={cartItems.length===0} className="w-full py-3 bg-velvet-red text-white rounded-xl font-semibold disabled:opacity-50 transition hover:brightness-110">{t.checkout}</button>
                </div>
            </div> </div> {customizeModal && <CustomizeModal dish={customizeModal} onClose={()=>setCustomizeModal(null)} onAddToCart={addToCart} />} {showAI && <AISuggester onClose={()=>setShowAI(false)} />} {featureModal && <FeatureModal type={featureModal} onClose={()=>setFeatureModal(null)} orders={orders} coins={coins} favorites={favorites} />} <ToastContainer toasts={toasts} /> <main className="pt-20"><Hero /><OurStory /><MenuGallery onOrder={(dish)=>setCustomizeModal(dish)} favorites={favorites} toggleFavorite={toggleFavorite} /><SignatureDishes specials={specialsDishes} onOrder={(dish)=>setCustomizeModal(dish)} /><TestimonialsSlider /><Footer /></main> <button onClick={()=>setShowAI(true)} className="fixed bottom-8 right-8 z-40 bg-velvet-red text-white p-4 rounded-full shadow-2xl hover:bg-red-velvet animate-pulse-soft"><i className="fas fa-robot text-xl"></i></button> </div> );
        };

        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [loading, setLoading] = useState(true);
            const [authenticated, setAuthenticated] = useState(false);
            const [userName, setUserName] = useState("Guest");
            const [userId, setUserId] = useState(null);
            const [weatherGreeting, setWeatherGreeting] = useState("");
            const [loginRequested, setLoginRequested] = useState(false);

            useEffect(() => { document.documentElement.classList.toggle('dark', darkMode); }, [darkMode]);
            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    if (session) {
                        setUserId(session.user.id);
                        supabase.from('profiles').select('name').eq('id', session.user.id).single()
                            .then(({ data }) => {
                                if (data) setUserName(data.name);
                                setAuthenticated(true);
                            })
                            .catch(() => setLoading(false))
                            .finally(() => setLoading(false));
                    } else {
                        setLoading(false);
                    }
                }).catch(() => setLoading(false));

                const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_IN' && session) {
                        setUserId(session.user.id);
                        supabase.from('profiles').select('name').eq('id', session.user.id).single()
                            .then(({ data }) => {
                                if (data) setUserName(data.name);
                                setAuthenticated(true);
                                setLoginRequested(false);
                            });
                    } else if (event === 'SIGNED_OUT') {
                        setAuthenticated(false);
                        setUserName('Guest');
                        setUserId(null);
                    }
                });

                return () => subscription?.unsubscribe();
            }, []);

            const handleSkip = () => {
                setAuthenticated(true);
                setUserName('Guest');
                setUserId(null);
                setLoginRequested(false);
            };

            const handleLogin = () => {
                setLoginRequested(false);
            };

            const requestLogin = () => {
                setLoginRequested(true);
            };

            const handleSignOut = async () => {
                await supabase.auth.signOut();
            };

            if (loginRequested) {
                return <AuthScreen onLogin={handleLogin} onSkip={handleSkip} setUserName={setUserName} />;
            }

            if (loading) return <LoadingScreen onComplete={() => setLoading(false)} />;
            if (!authenticated) return <AuthScreen onLogin={handleLogin} onSkip={handleSkip} setUserName={setUserName} />;
            return <><Cursor /><MainApp darkMode={darkMode} toggleDarkMode={() => setDarkMode(!darkMode)} onSignOut={handleSignOut} requestLogin={requestLogin} weatherGreeting={weatherGreeting} userName={userName} userId={userId} /></>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
